<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg6" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#fff8ea"/>
      <stop offset="55%" stop-color="#e0b563"/>
      <stop offset="100%" stop-color="#6b1423"/>
    </radialGradient>
    <linearGradient id="glass6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf4de"/>
      <stop offset="100%" stop-color="#e7c98a"/>
    </linearGradient>
    <linearGradient id="milk6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f0dfb8"/>
    </linearGradient>
    <filter id="shadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#3d2b1f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg6)"/>
  <circle cx="400" cy="300" r="230" fill="none" stroke="#8f2233" stroke-width="2" opacity="0.3"/>

  <g filter="url(#shadow6)">
    <path d="M320 200 L480 200 L455 440 Q400 465 345 440 Z" fill="url(#glass6)" stroke="#c8962c" stroke-width="3"/>
    <path d="M330 225 L470 225 L450 420 Q400 440 350 420 Z" fill="url(#milk6)"/>
  </g>

  <!-- almond slivers -->
  <g fill="#c9a15b" stroke="#9c7220" stroke-width="1.5">
    <ellipse cx="375" cy="235" rx="14" ry="6" transform="rotate(20 375 235)"/>
    <ellipse cx="410" cy="232" rx="14" ry="6" transform="rotate(-15 410 232)"/>
    <ellipse cx="440" cy="240" rx="12" ry="5" transform="rotate(30 440 240)"/>
  </g>

  <!-- saffron strands -->
  <g stroke="#8f2233" stroke-width="2.5" stroke-linecap="round">
    <path d="M370 245 q6 22 -6 38"/>
    <path d="M430 248 q-6 20 8 34"/>
  </g>

  <ellipse cx="400" cy="470" rx="120" ry="16" fill="#4a0d18" opacity="0.25"/>
</svg>
