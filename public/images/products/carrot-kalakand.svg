<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#fff1de"/>
      <stop offset="55%" stop-color="#e0925a"/>
      <stop offset="100%" stop-color="#6b1423"/>
    </radialGradient>
    <linearGradient id="plateRim4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f2233"/>
      <stop offset="100%" stop-color="#4a0d18"/>
    </linearGradient>
    <linearGradient id="cube4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e88a3c"/>
      <stop offset="100%" stop-color="#c1611f"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3d2b1f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg4)"/>
  <circle cx="400" cy="300" r="230" fill="none" stroke="#fffdf8" stroke-width="2" opacity="0.3"/>

  <ellipse cx="400" cy="430" rx="260" ry="46" fill="url(#plateRim4)"/>
  <ellipse cx="400" cy="418" rx="240" ry="36" fill="#fffdf8"/>

  <g filter="url(#shadow4)">
    <rect x="270" y="330" width="90" height="90" rx="8" fill="url(#cube4)"/>
    <rect x="365" y="315" width="90" height="90" rx="8" fill="url(#cube4)"/>
    <rect x="460" y="335" width="90" height="90" rx="8" fill="url(#cube4)"/>
    <rect x="315" y="270" width="90" height="90" rx="8" fill="url(#cube4)"/>
    <rect x="410" y="260" width="90" height="90" rx="8" fill="url(#cube4)"/>
  </g>

  <!-- carrot fleck texture -->
  <g stroke="#8a3d10" stroke-width="2" opacity="0.5" stroke-linecap="round">
    <path d="M295 355 l16 10"/>
    <path d="M390 340 l16 10"/>
    <path d="M485 360 l16 10"/>
    <path d="M340 295 l16 10"/>
    <path d="M435 285 l16 10"/>
  </g>

  <g fill="#8a9a4a">
    <ellipse cx="355" cy="280" rx="7" ry="4" transform="rotate(20 355 280)"/>
    <ellipse cx="440" cy="275" rx="7" ry="4" transform="rotate(-15 440 275)"/>
  </g>
</svg>
