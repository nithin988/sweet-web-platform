<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#f6e3c2"/>
      <stop offset="55%" stop-color="#b97a35"/>
      <stop offset="100%" stop-color="#4a0d18"/>
    </radialGradient>
    <linearGradient id="plateRim5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f2233"/>
      <stop offset="100%" stop-color="#4a0d18"/>
    </linearGradient>
    <radialGradient id="ball5" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a4712f"/>
      <stop offset="100%" stop-color="#6b430f"/>
    </radialGradient>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3d2b1f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg5)"/>
  <circle cx="400" cy="300" r="230" fill="none" stroke="#fffdf8" stroke-width="2" opacity="0.25"/>

  <ellipse cx="400" cy="430" rx="260" ry="46" fill="url(#plateRim5)"/>
  <ellipse cx="400" cy="418" rx="240" ry="36" fill="#fffdf8"/>

  <g filter="url(#shadow5)">
    <circle cx="320" cy="360" r="52" fill="url(#ball5)"/>
    <circle cx="420" cy="345" r="58" fill="url(#ball5)"/>
    <circle cx="500" cy="370" r="48" fill="url(#ball5)"/>
    <circle cx="370" cy="285" r="50" fill="url(#ball5)"/>
    <circle cx="460" cy="290" r="46" fill="url(#ball5)"/>
  </g>

  <g fill="#8a9a4a">
    <ellipse cx="420" cy="300" rx="8" ry="4" transform="rotate(10 420 300)"/>
    <ellipse cx="360" cy="345" rx="8" ry="4" transform="rotate(-20 360 345)"/>
  </g>
</svg>
