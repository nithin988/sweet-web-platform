<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#fff8ea"/>
      <stop offset="55%" stop-color="#f3e0b8"/>
      <stop offset="100%" stop-color="#6b1423"/>
    </radialGradient>
    <linearGradient id="plateRim1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f2233"/>
      <stop offset="100%" stop-color="#4a0d18"/>
    </linearGradient>
    <linearGradient id="cube1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#e8dcc4"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3d2b1f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg1)"/>
  <circle cx="400" cy="300" r="230" fill="none" stroke="#c8962c" stroke-width="2" opacity="0.35"/>

  <ellipse cx="400" cy="430" rx="260" ry="46" fill="url(#plateRim1)"/>
  <ellipse cx="400" cy="418" rx="240" ry="36" fill="#fffdf8"/>

  <g filter="url(#shadow1)">
    <rect x="270" y="330" width="90" height="90" rx="8" fill="url(#cube1)"/>
    <rect x="365" y="315" width="90" height="90" rx="8" fill="url(#cube1)"/>
    <rect x="460" y="335" width="90" height="90" rx="8" fill="url(#cube1)"/>
    <rect x="315" y="270" width="90" height="90" rx="8" fill="url(#cube1)"/>
    <rect x="410" y="260" width="90" height="90" rx="8" fill="url(#cube1)"/>
  </g>

  <!-- pistachio garnish -->
  <g fill="#8a9a4a">
    <ellipse cx="355" cy="280" rx="7" ry="4" transform="rotate(20 355 280)"/>
    <ellipse cx="440" cy="275" rx="7" ry="4" transform="rotate(-15 440 275)"/>
    <ellipse cx="400" cy="330" rx="7" ry="4" transform="rotate(40 400 330)"/>
  </g>

  <!-- saffron strands -->
  <g stroke="#c8962c" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <path d="M330 300 q10 20 -4 34"/>
    <path d="M470 300 q-8 18 6 30"/>
  </g>
</svg>
